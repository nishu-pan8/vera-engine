services:
  - type: web
    name: vera-message-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: ANTHROPIC_API_KEY
        sync: false